name: DAWN Full Link Regression

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  link_regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run DAWN link regression (non-blocking)
        continue-on-error: true
        run: |
          python -m dawn.runtime.test_links
