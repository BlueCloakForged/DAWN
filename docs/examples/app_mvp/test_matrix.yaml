project_id: app_mvp
levels:
- L0_contract
- L1_slice
- L2_smoke
- L3_nonfunctional
units:
- unit_id: datastore.data
  type: datastore
  path: data
  success_criteria:
  - Unit metadata present for datastore.data
  - 'Linked flows: 0'
  tests:
  - id: datastore.data.L0_contract
    level: L0_contract
    command: python3 -c 'import os; print("datastore access", os.path.exists("data"))'
    artifacts_expected: &id001
    - forgescaffold.system_catalog.json
  - id: datastore.data.L1_slice
    level: L1_slice
    command: echo "backup datastore schema for data"
    artifacts_expected: &id002
    - forgescaffold.dataflow_map.json
  - id: datastore.data.L2_smoke
    level: L2_smoke
    command: echo "run sample read/write against data"
    artifacts_expected: &id003
    - forgescaffold.test_matrix.yaml
  - id: datastore.data.L3_nonfunctional
    level: L3_nonfunctional
    command: echo "verify SLA hooks for data"
    artifacts_expected: &id004 []
