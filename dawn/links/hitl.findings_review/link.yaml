apiVersion: dawn.links/v1
kind: Link
metadata:
  name: hitl.findings_review
  description: >-
    AIPAM-specific HITL gate for per-finding analyst review.
    Generates a review template listing each finding; analyst marks
    each as confirmed or false_positive. Publishes reviewed findings.
spec:
  requires:
    - artifact: aipam.findings.ir
    - artifact: dawn.project.bundle
  produces:
    - artifact: aipam.findings.reviewed
      schema: json
      path: findings_reviewed.json
      description: "Findings with analyst verdicts attached"
  config:
    mode: BLOCKED # BLOCKED | AUTO | SKIP
    auto_confirm_threshold: 0.9
  runtime:
    timeoutSeconds: 0 # human-paced
    retries: 0
