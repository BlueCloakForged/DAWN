apiVersion: dawn.links/v1
kind: Link
metadata:
  name: forgescaffold.verify_ticket_cache_integrity
spec:
  description: "Verify ticket cache integrity against ticket_events.jsonl"
  requires: []
  produces:
    - artifactId: "forgescaffold.ticket_cache_integrity_report.json"
      path: "ticket_cache_integrity_report.json"
      schema:
        type: "json"
  runtime:
    timeoutSeconds: 60
    retries: 0
  steps:
    - id: run
      type: executor
    - id: emit_ledger
      type: ledger
