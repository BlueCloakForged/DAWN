apiVersion: dawn.links/v1
kind: Link
metadata:
  name: forgescaffold.status
spec:
  description: "Report ForgeScaffold operational status"
  requires: []
  produces:
    - artifactId: "forgescaffold.status.json"
      path: "status.json"
      schema:
        type: "json"
    - artifactId: "forgescaffold.status.md"
      path: "status.md"
      schema:
        type: "text"
  runtime:
    timeoutSeconds: 60
    retries: 0
  steps:
    - id: run
      type: executor
    - id: emit_ledger
      type: ledger
