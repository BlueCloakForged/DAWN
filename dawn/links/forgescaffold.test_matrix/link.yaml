apiVersion: dawn.links/v1
kind: Link
metadata:
  name: forgescaffold.test_matrix
spec:
  description: "Synthesize a test matrix spanning L0-L3 for the discovered units"
  requires:
    - artifactId: "forgescaffold.system_catalog.json"
      path: "system_catalog.json"
      schema:
        type: "json"
        ref: "forgescaffold.system_catalog"
    - artifactId: "forgescaffold.dataflow_map.json"
      path: "dataflow_map.json"
      schema:
        type: "json"
        ref: "forgescaffold.dataflow_map"
  produces:
    - artifactId: "forgescaffold.test_matrix.yaml"
      path: "test_matrix.yaml"
      schema:
        type: "yaml"
        ref: "forgescaffold.test_matrix"
    - artifactId: "forgescaffold.test_harness.manifest.json"
      path: "test_harness/manifest.json"
      schema:
        type: "json"
  runtime:
    timeoutSeconds: 300
    retries: 0
  steps:
    - id: validate_inputs
      type: validator
    - id: run
      type: executor
    - id: validate_outputs
      type: validator
    - id: emit_ledger
      type: ledger
