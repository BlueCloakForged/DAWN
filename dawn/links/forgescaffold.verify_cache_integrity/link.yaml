apiVersion: dawn.links/v1
kind: Link
metadata:
  name: forgescaffold.verify_cache_integrity
spec:
  description: "Verify evidence index cache integrity against raw JSONL"
  requires: []
  produces:
    - artifactId: "forgescaffold.cache_integrity_report.json"
      path: "cache_integrity_report.json"
      schema:
        type: "json"
  runtime:
    timeoutSeconds: 120
    retries: 0
  steps:
    - id: run
      type: executor
    - id: emit_ledger
      type: ledger
