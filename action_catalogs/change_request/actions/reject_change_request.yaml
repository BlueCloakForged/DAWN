action_name: reject_change_request
description: >
  Reject a change request under review, advancing it to the rejected terminal state.
  Requires a held review token. Symmetric with approve_change_request in guards and
  trust requirements. Manual compensation only.
resource_type: change_request
action_family: approve
input_schema_ref: "schemas/change_request/reject_input.json"
output_schema_ref: "schemas/change_request/reject_output.json"
required_capabilities:
  - change_request_approve
idempotency_required: true
idempotency_scope: resource
risk_level: high
consistency_profile: READ_YOUR_WRITES
session_watermark_required: true
conflict_resolution_strategy: default
compensation_strategy: manual_only
participates_in_saga: true
required_trust_tier: "T3/privileged"
retry_class: recheck_then_retry
allowed_from_states:
  - under_review
transitions_to_state: rejected
guard_predicates:
  - name: state_is_under_review
    guard_type: state
    parameters: {expected_state: under_review}
    evaluation_order: 1
  - name: review_token_held
    guard_type: permission
    parameters: {token_type: validation_gate, check: held_by_requesting_session}
    evaluation_order: 2
side_effects:
  - effect_type: event_emit
    reversible: false
    description: Emits ChangeRequestRejected event with rejection reason.
    target_system: notification_service
budget_cost_units: 5.0
budget_dimensions_consumed:
  - mutate
  - high_risk
